name: Aether CI

on:
  push:
    branches: [main, 'release/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  # ──────────────────────────────────────────────
  # Lint: formatting, clippy, and security audit
  # ──────────────────────────────────────────────
  lint:
    name: Lint & Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.86.0
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-lint-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Security audit dependencies
        continue-on-error: true
        run: cargo audit

  # ──────────────────────────────────────────────
  # Test: unit tests, doc tests, integration tests
  # ──────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.86.0

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-test-

      - name: Run unit tests
        run: cargo test --all-features --workspace

      - name: Run doc tests
        run: cargo test --doc --all-features --workspace

  # ──────────────────────────────────────────────
  # Build: release binaries for supported targets
  # ──────────────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.86.0
          targets: ${{ matrix.target }}

      - name: Install ARM64 cross-compiler
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu pkg-config

      - name: Configure ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_AR=aarch64-linux-gnu-ar" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "AR_aarch64_unknown_linux_gnu=aarch64-linux-gnu-ar" >> $GITHUB_ENV

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-build-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

  # ──────────────────────────────────────────────
  # Docker: build and validate container image
  # ──────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: aether-node:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # Integration: smoke-test the container runtime path
  # ──────────────────────────────────────────────
  integration:
    name: Container Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.86.0

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-integration-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-integration-

      - name: Start containerized node
        run: docker compose -f docker-compose.test.yml up -d node

      - name: Show container status
        run: docker compose -f docker-compose.test.yml ps

      - name: Run containerized smoke checks
        run: docker compose -f docker-compose.test.yml run --rm test-runner

      - name: Collect logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs --tail=100

      - name: Stop test network
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  # ──────────────────────────────────────────────
  # Phase acceptance: milestone validation suites
  # ──────────────────────────────────────────────
  phase-acceptance:
    name: Phase ${{ matrix.phase }} Acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, test]
    strategy:
      fail-fast: false
      matrix:
        phase: [1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.86.0

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-phase${{ matrix.phase }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-phase${{ matrix.phase }}-

      - name: Run Phase ${{ matrix.phase }} acceptance suite
        run: |
          if [ -f "./scripts/run_phase${{ matrix.phase }}_acceptance.sh" ]; then
            chmod +x ./scripts/run_phase${{ matrix.phase }}_acceptance.sh
            ./scripts/run_phase${{ matrix.phase }}_acceptance.sh
          else
            echo "Phase ${{ matrix.phase }} acceptance script not found, skipping"
          fi
