name: Aether CI

on:
  push:
    branches: [main, 'release/**']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  # ──────────────────────────────────────────────
  # Lint: formatting and clippy
  # ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-lint-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ──────────────────────────────────────────────
  # Security audit (separate job, non-blocking but visible)
  # ──────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit dependencies for known vulnerabilities
        run: cargo audit

  # ──────────────────────────────────────────────
  # Test: unit + doc tests via nextest
  # ──────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-test-

      - name: Run unit tests
        run: cargo nextest run --all-features --workspace

      - name: Run doc tests
        run: cargo test --doc --all-features --workspace

  # ──────────────────────────────────────────────
  # Build: release binaries for supported targets
  # ──────────────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install ARM64 cross-compiler
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu pkg-config

      - name: Configure ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_AR=aarch64-linux-gnu-ar" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "AR_aarch64_unknown_linux_gnu=aarch64-linux-gnu-ar" >> $GITHUB_ENV

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-build-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

  # ──────────────────────────────────────────────
  # Docker: build and validate container image
  # ──────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: aether-node:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # Integration: test with Docker Compose network
  # ──────────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test, docker]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-integration-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-integration-

      - name: Start test network
        run: docker compose -f docker-compose.test.yml up -d

      - name: Wait for network readiness
        run: |
          echo "Waiting for test network to be ready..."
          for i in $(seq 1 60); do
            if docker compose -f docker-compose.test.yml ps --format json | grep -q '"Health":"healthy"'; then
              echo "Network ready after ${i}s"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::warning::Network may not be fully ready after 60s, proceeding"
            fi
            sleep 1
          done

      - name: Run integration tests (ignored tests only)
        run: cargo nextest run --all-features --workspace --run-ignored ignored-only

      - name: Collect logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs --tail=200

      - name: Stop test network
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  # ──────────────────────────────────────────────
  # Phase acceptance: milestone validation suites
  # ──────────────────────────────────────────────
  phase-acceptance:
    name: Phase ${{ matrix.phase }} Acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, test]
    strategy:
      fail-fast: false
      matrix:
        phase: [1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-phase${{ matrix.phase }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-phase${{ matrix.phase }}-

      - name: Verify acceptance script exists
        run: |
          SCRIPT="./scripts/run_phase${{ matrix.phase }}_acceptance.sh"
          if [ ! -f "$SCRIPT" ]; then
            echo "::error::Phase ${{ matrix.phase }} acceptance script not found: $SCRIPT"
            exit 1
          fi

      - name: Run Phase ${{ matrix.phase }} acceptance suite
        run: |
          chmod +x ./scripts/run_phase${{ matrix.phase }}_acceptance.sh
          ./scripts/run_phase${{ matrix.phase }}_acceptance.sh

  # ──────────────────────────────────────────────
  # CI gate: single required check for branch protection
  # ──────────────────────────────────────────────
  ci-pass:
    name: CI
    if: always()
    needs: [lint, test, build, docker, integration, phase-acceptance]
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Check all jobs passed
        run: |
          echo "Lint:        ${{ needs.lint.result }}"
          echo "Test:        ${{ needs.test.result }}"
          echo "Build:       ${{ needs.build.result }}"
          echo "Docker:      ${{ needs.docker.result }}"
          echo "Integration: ${{ needs.integration.result }}"
          echo "Acceptance:  ${{ needs.phase-acceptance.result }}"
          if [[ "${{ needs.lint.result }}" != "success" ]] ||
             [[ "${{ needs.test.result }}" != "success" ]] ||
             [[ "${{ needs.build.result }}" != "success" ]] ||
             [[ "${{ needs.docker.result }}" != "success" ]] ||
             [[ "${{ needs.integration.result }}" != "success" ]] ||
             [[ "${{ needs.phase-acceptance.result }}" != "success" ]]; then
            echo "::error::One or more required jobs failed"
            exit 1
          fi
          echo "All CI checks passed"
