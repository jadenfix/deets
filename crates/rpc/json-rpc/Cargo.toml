[package]
name = "aether-rpc-json"
version.workspace = true
edition.workspace = true
description = "JSON-RPC 2.0 server for Aether node API access (accounts, transactions, blocks)"
categories = ["web-programming", "cryptography::cryptocurrencies"]
keywords = ["aether", "rpc", "json-rpc", "api"]

[dependencies]
tokio = { workspace = true, features = ["sync"] }
serde.workspace = true
serde_json.workspace = true
bincode.workspace = true
anyhow.workspace = true
tracing.workspace = true
warp = "0.3"
hex = "0.4"
futures = "0.3"

aether-types = { path = "../../types" }
aether-ledger = { path = "../../ledger" }
aether-metrics = { path = "../../metrics" }

[dev-dependencies]
proptest = "1"
tokio = { workspace = true, features = ["full", "test-util"] }
criterion = { workspace = true }

[[bench]]
name = "rpc_bench"
harness = false
