[package]
name = "aether-cli"
version.workspace = true
edition.workspace = true
description = "aetherctl: command-line interface for Aether node management, key operations, and DevNet control"
categories = ["command-line-utilities", "cryptography::cryptocurrencies"]
keywords = ["aether", "cli", "aetherctl", "devnet"]

[[bin]]
name = "aetherctl"
path = "src/main.rs"

[dependencies]
tokio.workspace = true
anyhow.workspace = true
serde.workspace = true
serde_json.workspace = true
bincode.workspace = true
toml = "0.8"
dirs = "5"
clap = { version = "4.5", features = ["derive"] }
hex = "0.4"

aether-types = { path = "../../types" }
aether-crypto-primitives = { path = "../../crypto/primitives" }
aether-sdk = { path = "../../sdk/rust" }

[dev-dependencies]
assert_cmd = "2"
predicates = "3"
tempfile = "3"
proptest = "1"
