[package]
name = "aether-indexer"
version.workspace = true
edition.workspace = true
description = "Block and transaction indexer with queryable storage for Aether explorer and analytics"
categories = ["cryptography::cryptocurrencies"]
keywords = ["aether", "indexer", "explorer", "analytics"]

[dependencies]
tokio.workspace = true
anyhow.workspace = true
serde.workspace = true
serde_json.workspace = true
