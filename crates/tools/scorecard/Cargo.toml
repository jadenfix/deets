[package]
name = "aether-scorecard"
version.workspace = true
edition.workspace = true
description = "Validator performance scorecard: uptime, latency, and liveness metrics for Aether"
categories = ["development-tools::profiling"]
keywords = ["aether", "scorecard", "validators", "metrics"]

[dependencies]
anyhow.workspace = true
clap = { version = "4.5", features = ["derive"] }
serde.workspace = true
serde_json.workspace = true
thiserror = "1"

[dev-dependencies]
pretty_assertions = "1"
