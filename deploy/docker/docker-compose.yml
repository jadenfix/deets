services:
  node:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.rpc
    environment:
      - AETHER_CONFIG_PATH=/config/genesis.toml
      - AETHER_NODE_DB_PATH=/data
      - AETHER_RPC_BIND=0.0.0.0
      - AETHER_NETWORK=devnet
    volumes:
      - ../../config:/config:ro
      - node-data:/data
    ports:
      - "8545:8545"
      - "9000:9000"
    networks:
      - aether-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8545/health"]
      interval: 5s
      timeout: 3s
      retries: 20

  indexer:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.indexer
    environment:
      - INDEXER_RPC_URL=http://node:8545
      - INDEXER_BIND=0.0.0.0
      - INDEXER_PORT=8081
      - INDEXER_DB_PATH=/data/indexer
    volumes:
      - indexer-data:/data/indexer
    depends_on:
      node:
        condition: service_healthy
    ports:
      - "8081:8081"
    networks:
      - aether-net

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - aether-net

  grafana:
    image: grafana/grafana:latest
    volumes:
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    networks:
      - aether-net

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=aether
      - MINIO_ROOT_PASSWORD=aether123
    volumes:
      - minio-data:/data
    ports:
      - "9001:9001"
      - "9002:9000"
    networks:
      - aether-net

networks:
  aether-net:
    driver: bridge

volumes:
  node-data:
  indexer-data:
  prometheus-data:
  grafana-data:
  minio-data:
