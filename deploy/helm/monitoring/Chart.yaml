apiVersion: v2
name: aether-monitoring
description: Prometheus + Grafana monitoring stack for Aether
type: application
version: 0.1.0
appVersion: "0.1.0"
dependencies:
  - name: prometheus
    version: "25.x"
    repository: https://prometheus-community.github.io/helm-charts
    condition: prometheus.enabled
  - name: grafana
    version: "7.x"
    repository: https://grafana.github.io/helm-charts
    condition: grafana.enabled
