apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-validator
  labels:
    app: aether-validator
spec:
  clusterIP: None
  ports:
    - name: rpc
      port: {{ .Values.ports.rpc }}
      targetPort: rpc
    - name: p2p
      port: {{ .Values.ports.p2p }}
      targetPort: p2p
    - name: metrics
      port: {{ .Values.ports.metrics }}
      targetPort: metrics
  selector:
    app: aether-validator
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-rpc
  labels:
    app: aether-validator
spec:
  type: ClusterIP
  ports:
    - name: rpc
      port: 8545
      targetPort: rpc
  selector:
    app: aether-validator
