apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-validator
  labels:
    app: aether-validator
spec:
  serviceName: {{ .Release.Name }}-validator
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: aether-validator
  template:
    metadata:
      labels:
        app: aether-validator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.ports.metrics }}"
    spec:
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      containers:
        - name: validator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: rpc
              containerPort: {{ .Values.ports.rpc }}
            - name: p2p
              containerPort: {{ .Values.ports.p2p }}
            - name: metrics
              containerPort: {{ .Values.ports.metrics }}
          env:
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            - name: AETHER_NODE_DB_PATH
              value: /data/aether
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data/aether
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.storage.storageClass }}
        resources:
          requests:
            storage: {{ .Values.storage.size }}
