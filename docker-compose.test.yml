version: '3.8'

services:
  # Genesis ceremony: generates shared genesis.json + 4 validator keys
  genesis-init:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["genesis-ceremony"]
    command: ["--validators", "4", "--output-dir", "/data/genesis", "--stake", "1000000", "--network", "devnet"]
    volumes:
      - genesis-data:/data/genesis

  # 4-node test network — all share the same genesis.json via a volume
  validator-1:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/app/scripts/docker-entrypoint.sh"]
    depends_on:
      genesis-init:
        condition: service_completed_successfully
    environment:
      - VALIDATOR_ID=1
      - NUM_VALIDATORS=4
      - AETHER_GENESIS_DIR=/data/genesis
      - AETHER_RPC_PORT=8545
      - AETHER_P2P_PORT=9000
      - AETHER_BOOTSTRAP_PEERS=
      - RUST_LOG=info
    ports:
      - "8545:8545"  # JSON-RPC
      - "9000:9000"  # P2P gossip
    volumes:
      - genesis-data:/data/genesis:ro
      - validator-1-data:/data/validator-1
    networks:
      - aether-testnet
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8545/health"]
      interval: 10s
      timeout: 3s
      start_period: 15s
      retries: 3

  validator-2:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/app/scripts/docker-entrypoint.sh"]
    depends_on:
      genesis-init:
        condition: service_completed_successfully
      validator-1:
        condition: service_healthy
    environment:
      - VALIDATOR_ID=2
      - NUM_VALIDATORS=4
      - AETHER_GENESIS_DIR=/data/genesis
      - AETHER_RPC_PORT=8545
      - AETHER_P2P_PORT=9000
      - AETHER_BOOTSTRAP_PEERS=/ip4/validator-1/tcp/9000
      - RUST_LOG=info
    ports:
      - "8546:8545"  # JSON-RPC
      - "9001:9000"  # P2P gossip
    volumes:
      - genesis-data:/data/genesis:ro
      - validator-2-data:/data/validator-2
    networks:
      - aether-testnet
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8545/health"]
      interval: 10s
      timeout: 3s
      start_period: 15s
      retries: 3

  validator-3:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/app/scripts/docker-entrypoint.sh"]
    depends_on:
      genesis-init:
        condition: service_completed_successfully
      validator-1:
        condition: service_healthy
    environment:
      - VALIDATOR_ID=3
      - NUM_VALIDATORS=4
      - AETHER_GENESIS_DIR=/data/genesis
      - AETHER_RPC_PORT=8545
      - AETHER_P2P_PORT=9000
      - AETHER_BOOTSTRAP_PEERS=/ip4/validator-1/tcp/9000
      - RUST_LOG=info
    ports:
      - "8547:8545"  # JSON-RPC
      - "9002:9000"  # P2P gossip
    volumes:
      - genesis-data:/data/genesis:ro
      - validator-3-data:/data/validator-3
    networks:
      - aether-testnet
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8545/health"]
      interval: 10s
      timeout: 3s
      start_period: 15s
      retries: 3

  validator-4:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/app/scripts/docker-entrypoint.sh"]
    depends_on:
      genesis-init:
        condition: service_completed_successfully
      validator-1:
        condition: service_healthy
    environment:
      - VALIDATOR_ID=4
      - NUM_VALIDATORS=4
      - AETHER_GENESIS_DIR=/data/genesis
      - AETHER_RPC_PORT=8545
      - AETHER_P2P_PORT=9000
      - AETHER_BOOTSTRAP_PEERS=/ip4/validator-1/tcp/9000
      - RUST_LOG=info
    ports:
      - "8548:8545"  # JSON-RPC
      - "9003:9000"  # P2P gossip
    volumes:
      - genesis-data:/data/genesis:ro
      - validator-4-data:/data/validator-4
    networks:
      - aether-testnet
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8545/health"]
      interval: 10s
      timeout: 3s
      start_period: 15s
      retries: 3

  # Test runner
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    depends_on:
      validator-1:
        condition: service_healthy
      validator-2:
        condition: service_healthy
      validator-3:
        condition: service_healthy
      validator-4:
        condition: service_healthy
    environment:
      - RPC_URL=http://validator-1:8545
    networks:
      - aether-testnet
    command: |
      sh -c "cargo test --all-features --workspace"

volumes:
  genesis-data:
  validator-1-data:
  validator-2-data:
  validator-3-data:
  validator-4-data:

networks:
  aether-testnet:
    driver: bridge
