services:
  node:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - AETHER_NETWORK=devnet
      - AETHER_RPC_BIND=0.0.0.0
      - AETHER_NODE_DB_PATH=/app/data
    volumes:
      - node-data:/app/data
    networks:
      - aether-testnet
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8545/health"]
      interval: 2s
      timeout: 2s
      retries: 30

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    depends_on:
      node:
        condition: service_healthy
    environment:
      - RPC_URL=http://node:8545
    networks:
      - aether-testnet
    command: ["sh", "-eu", "./scripts/docker-integration-smoke.sh"]

volumes:
  node-data:

networks:
  aether-testnet:
    driver: bridge
