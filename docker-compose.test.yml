version: '3.8'

x-validator-healthcheck: &validator-healthcheck
  healthcheck:
    test: ["CMD-SHELL", "curl -sf http://localhost:8545 -X POST -H 'Content-Type: application/json' -d '{\"jsonrpc\":\"2.0\",\"method\":\"aeth_getSlotNumber\",\"params\":[],\"id\":1}' || exit 1"]
    interval: 2s
    timeout: 5s
    retries: 15
    start_period: 10s

services:
  # 4-node test network
  validator-1:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - VALIDATOR_ID=1
      - PEERS=validator-2:9000,validator-3:9000,validator-4:9000
    ports:
      - "8545:8545"  # JSON-RPC
      - "9000:9000"  # P2P gossip
    volumes:
      - validator-1-data:/app/data
    networks:
      - aether-testnet
    <<: *validator-healthcheck

  validator-2:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - VALIDATOR_ID=2
      - PEERS=validator-1:9000,validator-3:9000,validator-4:9000
    ports:
      - "8546:8545"  # JSON-RPC
      - "9001:9000"  # P2P gossip
    volumes:
      - validator-2-data:/app/data
    networks:
      - aether-testnet
    <<: *validator-healthcheck

  validator-3:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - VALIDATOR_ID=3
      - PEERS=validator-1:9000,validator-2:9000,validator-4:9000
    ports:
      - "8547:8545"  # JSON-RPC
      - "9002:9000"  # P2P gossip
    volumes:
      - validator-3-data:/app/data
    networks:
      - aether-testnet
    <<: *validator-healthcheck

  validator-4:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - VALIDATOR_ID=4
      - PEERS=validator-1:9000,validator-2:9000,validator-3:9000
    ports:
      - "8548:8545"  # JSON-RPC
      - "9003:9000"  # P2P gossip
    volumes:
      - validator-4-data:/app/data
    networks:
      - aether-testnet
    <<: *validator-healthcheck

  # Test runner
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    depends_on:
      validator-1:
        condition: service_healthy
      validator-2:
        condition: service_healthy
      validator-3:
        condition: service_healthy
      validator-4:
        condition: service_healthy
    environment:
      - RPC_URL=http://validator-1:8545
    networks:
      - aether-testnet
    command: cargo test --all-features --workspace

volumes:
  validator-1-data:
  validator-2-data:
  validator-3-data:
  validator-4-data:

networks:
  aether-testnet:
    driver: bridge
