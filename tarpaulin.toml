# cargo-tarpaulin configuration for Aether blockchain
# Run: cargo tarpaulin --config tarpaulin.toml

[default]
# Run all workspace tests
workspace = true
# Output formats
out = ["Lcov", "Html"]
# Output directory
output-dir = "target/coverage"
# Exclude test code itself from coverage
exclude-files = ["*/tests/*", "*/fuzz/*", "*/benches/*"]
# Skip crates that are test-only or infrastructure
exclude = [
    "aether-faucet",
    "aether-loadgen",
    "aether-scorecard",
    "aether-indexer",
]
# Timeout per test (seconds)
timeout = 120
# Use all available features
all-features = true
